# ProcGuard — configuración por defecto (Slice 4b Fase 7).
# dry_run=true: el engine previsualiza la secuencia de escalamiento sin tocar
# procesos (loguea "would <kind>"). Ponlo en false para gobernanza real.

[global]
sample_interval = 500      ; ms entre ciclos
sample_buffer = 16         ; muestras por proceso en el store (PDF default 120)
dry_run = true
max_kills_per_minute = 3
max_caged_processes = 10
cage_cpu_percent = 50      ; cpu.max del cage = 50% de un core (Slice 4c)

[security]
# comms protegidos (whitelist ADR-012): se omiten si además corren desde una
# ruta estándar (protected_paths; default /usr/bin,/usr/sbin,/bin,/sbin).
protected_names = systemd, sshd, init, bash, procguard

[policy:cpu_hog]
type = performance
risk = high
metric = cpu_percent
threshold = 80.0
threshold_low = 60.0
persistence = 3
hysteresis_m = 2
cooldown_s = 10
actions = warn, renice:10, cage, stop, kill

# Config de DEMOSTRACIÓN (sustentación). dry_run=true → ProcGuard detecta,
# decide y "ejecuta" la secuencia pero NO toca procesos reales: loguea
# [DRY-RUN] would <acción>. Umbral 80% para que dispare sobre el CPU-hog.
# cooldown=0 y persistence=2 → escalamiento rápido y legible en la demo.

[global]
sample_interval = 500
sample_buffer = 16
dry_run = true
max_kills_per_minute = 3
max_caged_processes = 10
cage_cpu_percent = 50

[security]
# Whitelist (PDF §7): estos no reciben acción aunque alerten. Demuestra la
# protección contra daño autoinfligido sobre servicios del sistema.
protected_names = systemd, sshd, init, bash, procguard, gnome-shell, Xwayland

[policy:cpu_hog]
type = performance
risk = high
metric = cpu_percent
threshold = 80.0
threshold_low = 60.0
persistence = 2
hysteresis_m = 2
cooldown_s = 0
actions = warn, renice:10, cage, stop, kill
